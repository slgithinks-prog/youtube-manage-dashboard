<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 채널 관리 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --txt:#e7e9ee; --sub:#9aa0ad; --accent:#ff4d4d; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif; }
  header { padding:20px 24px; border-bottom:1px solid var(--line);
           display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  header h1 { font-size:18px; margin:0; }
  .updated { color:var(--sub); font-size:13px; }
  .wrap { max-width:1100px; margin:0 auto; padding:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .ch-head { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .ch-head img { width:44px; height:44px; border-radius:50%; background:#333; }
  .ch-name { font-weight:600; font-size:15px; }
  .ch-name a { color:var(--txt); text-decoration:none; }
  .stats { display:flex; gap:16px; margin:10px 0; }
  .stat .n { font-size:18px; font-weight:700; }
  .stat .l { font-size:11px; color:var(--sub); }
  .vids { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  .vid { display:flex; justify-content:space-between; gap:8px; padding:6px 0; font-size:13px; }
  .vid a { color:var(--txt); text-decoration:none; overflow:hidden; text-overflow:ellipsis;
           white-space:nowrap; max-width:200px; }
  .vid .meta { color:var(--sub); white-space:nowrap; font-size:12px; }
  h2 { font-size:15px; margin:28px 0 12px; color:var(--sub); }
  .chartbox { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
          align-items:center; justify-content:center; gap:12px; z-index:10; }
  #gate input { padding:10px 14px; border-radius:8px; border:1px solid var(--line);
                background:var(--card); color:var(--txt); font-size:15px; }
  #gate button { padding:10px 20px; border:0; border-radius:8px; background:var(--accent);
                 color:#fff; font-size:15px; cursor:pointer; }
  .empty { color:var(--sub); padding:40px; text-align:center; }
</style>
</head>
<body>

<!-- 간단한 비밀번호 게이트 (정적 사이트라 강력하진 않음 — README 참고) -->
<div id="gate">
  <div style="font-size:16px;">🔒 대시보드 접근</div>
  <input id="pw" type="password" placeholder="비밀번호" autofocus>
  <button onclick="checkPw()">입장</button>
  <div id="pwmsg" style="color:var(--accent);font-size:13px;height:16px;"></div>
</div>

<header>
  <h1>유튜브 채널 관리 대시보드</h1>
  <div class="updated" id="updated">불러오는 중…</div>
</header>

<div class="wrap" id="main" style="display:none;">
  <div class="grid" id="cards"></div>
  <h2>구독자 추이</h2>
  <div class="chartbox"><canvas id="subsChart" height="110"></canvas></div>
  <h2>누적 조회수 추이</h2>
  <div class="chartbox"><canvas id="viewsChart" height="110"></canvas></div>
</div>

<script>
// ── 비밀번호 게이트 ──────────────────────────────
// 약한 보호임(소스에 해시가 들어감). 진짜 보안이 필요하면 README의 Cloudflare Access 참고.
// 비밀번호 바꾸려면 아래 PW_PLAIN 을 수정. (기본값: changeme)
const PW_PLAIN = "changeme";
function checkPw(){
  const v = document.getElementById('pw').value;
  if (v === PW_PLAIN){
    sessionStorage.setItem('ok','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('main').style.display='block';
    init();
  } else {
    document.getElementById('pwmsg').textContent = '비밀번호가 틀렸습니다.';
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });
if (sessionStorage.getItem('ok')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('main').style.display='block';
  init();   // script가 body 끝이라 DOM은 이미 준비됨 — 바로 호출 (재방문 시 빈 화면 방지)
}

// ── 데이터 로드 & 렌더 ───────────────────────────
const fmt = n => (n||0).toLocaleString('ko-KR');
const when = iso => { if(!iso) return ''; const d=new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };

async function init(){
  let snap, hist=[];
  try { snap = await (await fetch('./data/channels.json?_='+Date.now())).json(); }
  catch(e){ document.getElementById('cards').innerHTML =
    '<div class="empty">아직 수집된 자료가 없습니다. 일일 수집이 1회 이상 돌면 표시됩니다.</div>'; return; }
  try { hist = await (await fetch('./data/history.json?_='+Date.now())).json(); } catch(e){}

  document.getElementById('updated').textContent = '업데이트: ' + (snap.updated_at||'-');
  renderCards(snap.channels||[]);
  renderCharts(hist||[]);
}

function renderCards(channels){
  const box = document.getElementById('cards');
  if(!channels.length){ box.innerHTML='<div class="empty">등록된 채널이 없습니다.</div>'; return; }
  box.innerHTML = channels.map(c => `
    <div class="card">
      <div class="ch-head">
        <img src="${c.thumbnail||''}" alt="">
        <div>
          <div class="ch-name"><a href="${c.channel_url}" target="_blank">${c.name||c.title}</a></div>
          <div class="updated">영상 ${fmt(c.video_count)}개</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="n">${fmt(c.subscribers)}</div><div class="l">구독자</div></div>
        <div class="stat"><div class="n">${fmt(c.total_views)}</div><div class="l">누적 조회수</div></div>
      </div>
      <div class="vids">
        ${(c.recent_videos||[]).slice(0,5).map(v => `
          <div class="vid">
            <a href="${v.url}" target="_blank" title="${v.title}">${v.title}</a>
            <span class="meta">${when(v.published_at)} · ${fmt(v.views)}회</span>
          </div>`).join('') || '<div class="updated">최근 영상 없음</div>'}
      </div>
    </div>`).join('');
}

let charts = {};
function renderCharts(history){
  if(!history.length) return;
  const dates = history.map(h => h.date);
  // 채널 id 모음
  const ids = {};
  history.forEach(h => Object.entries(h.channels||{}).forEach(([id,v]) => ids[id]=v.name));
  const palette = ['#ff4d4d','#4d9dff','#4dffb0','#ffd24d','#b04dff','#ff8c4d','#4dffff'];

  function series(field){
    return Object.keys(ids).map((id,i) => ({
      label: ids[id],
      data: history.map(h => (h.channels[id]||{})[field] ?? null),
      borderColor: palette[i%palette.length],
      backgroundColor: palette[i%palette.length],
      tension:0.25, spanGaps:true,
    }));
  }
  const opts = { responsive:true, plugins:{legend:{labels:{color:'#9aa0ad'}}},
    scales:{ x:{ticks:{color:'#9aa0ad'},grid:{color:'#2a2e38'}},
             y:{ticks:{color:'#9aa0ad'},grid:{color:'#2a2e38'}} } };

  if(charts.subs) charts.subs.destroy();
  if(charts.views) charts.views.destroy();
  charts.subs = new Chart(document.getElementById('subsChart'),
    { type:'line', data:{labels:dates, datasets:series('subscribers')}, options:opts });
  charts.views = new Chart(document.getElementById('viewsChart'),
    { type:'line', data:{labels:dates, datasets:series('total_views')}, options:opts });
}
</script>
</body>
</html>
