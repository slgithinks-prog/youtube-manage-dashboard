name: daily-collect

# 매일 1회 유튜브 자료를 수집해서 이 repo의 data/ 에 직접 커밋한다.
# 같은 repo에 쓰기 때문에 별도 토큰이 필요 없다 (기본 GITHUB_TOKEN 사용).
on:
  schedule:
    - cron: "0 0 * * *"     # 매일 UTC 00:00 = 한국시간 오전 9시
  workflow_dispatch:          # 버튼으로 수동 실행도 가능

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 자료 수집
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OUTPUT_DIR: data
          RECENT_VIDEOS: "10"
        run: python collect.py

      - name: 변경분 커밋
        run: |
          git config user.name "youtube-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
